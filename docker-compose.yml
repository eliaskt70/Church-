version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: qarib_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qarib
      POSTGRES_USER: qarib_user
      POSTGRES_PASSWORD: qarib_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qarib_user -d qarib']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
